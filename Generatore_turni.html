                const shiftHours = getHoursDiff(shiftDef.start, shiftDef.end);

                if (employee.requiresPairing) {
                    const needed = req.personnel[shiftIndex];
                    if (currentAssignmentsInCell.length === needed - 1) { 
                        const isSeniorPresent = currentAssignmentsInCell.some(e => {
                           const emp = employees.find(empDef => empDef.name === e.name);
                           return emp && seniorRoleIds.includes(emp.roleId || 0);
                        });
                        if (!isSeniorPresent) { return Infinity; }
                    }
                }
                let score = stats[employee.id].hours;
                
                if (employee.restDay === dayName) score += 500;

                const weeklyShifts = (stats[employee.id].weeklyShifts[weekNum] || 0);
                if (weeklyShifts >= (7 - employee.restDaysPerWeek)) score += 500 * (weeklyShifts - (7 - employee.restDaysPerWeek) + 1);
                const hoursProjection = (stats[employee.id].hours + shiftHours);
                if (hoursProjection > employee.maxHours) score += (hoursProjection - employee.maxHours) * 10;
                const pref = employee.preferences.find(p => p.day === dayName && p.shiftIndex === shiftIndex);
                if (pref?.type === PreferenceType.PREFEERED) score -= 20;
                if (pref?.type === PreferenceType.MANDATORY) score -= 10000;
                
                if (employee.preferredBarIds && employee.preferredBarIds.includes(bar.id)) {
                    score -= 50; 
                }

                if (employee.requiresPairing) {
                    const isSeniorPresent = currentAssignmentsInCell.some(e => {
                        const emp = employees.find(empDef => empDef.name === e.name);
                        return emp && seniorRoleIds.includes(emp.roleId || 0);
                    });
                    if (!isSeniorPresent) { score += 200; }
                }
                score += Math.random(); 
                return score;
            };

            const generateSchedule = () => {
                const dates = getDatesForPeriod();
                if (!dates || dates.length === 0) { alert("Seleziona un periodo valido per generare la griglia."); return; }
                const newSchedule = {};
                const empStats = {};
                employees.forEach(e => { empStats[e.id] = { hours: 0, weeklyShifts: {} }; });
                const seniorRoleIds = roles.filter(r => r.name === 'Barman' || r.name === 'Manager').map(r => r.id);
                const waiterRoleId = roles.find(r => r.name === 'Cameriere')?.id;

                dates.forEach(date => {
                    const isoDate = date.toISOString().split('T')[0];
                    const dayName = DAYS_OF_WEEK[date.getDay() === 0 ? 6 : date.getDay() - 1];
                    newSchedule[isoDate] = {};
                    const assignedToday = new Set();
                    bars.forEach(bar => {
                        const isBarClosed = bar.closurePeriods?.some(p => isoDate >= p.start && isoDate <= p.end);
                        if (bar.closedDay === dayName || isBarClosed) return;
                        const req = requirements.find(r => r.barId === bar.id && r.day === dayName) || { id: 'default', barId: bar.id, day: dayName, personnel: bar.shifts === 2 ? [1, 1, 0] : [1, 1, 1], waiters: [0,0,0] };
                        
                        // Partial closure check
                        const partialClosure = bar.partialClosures?.find(pc => pc.day === dayName);

                        for (let shiftIndex = 0; shiftIndex < bar.shifts; shiftIndex++) {
                            const cellKey = `${bar.id}-${shiftIndex}`;
                            
                            // Check if this specific shift is closed
                            if (partialClosure && partialClosure.closedShiftIndexes.includes(shiftIndex)) {
                                newSchedule[isoDate][cellKey] = [{ name: 'CHIUSO', start: '', end: '' }];
                                continue;
                            }

                            const needed = req.personnel[shiftIndex];
                            if (needed === 0) { newSchedule[isoDate][cellKey] = []; continue; }
                            const waitersNeeded = req.waiters?.[shiftIndex] || 0;
                            let assignedEmployees = [];
                            
                            // Updated isAvailable to check for Holidays
                            const isAvailable = (emp) => {
                                if (assignedEmployees.some(a => a.name === emp.name)) return false;
                                if (assignedToday.has(emp.id)) return false;
                                if (!emp.enabledBarIds.includes(bar.id)) return false;
                                
                                // Check for holidays
                                if (emp.holidays && emp.holidays.some(h => isoDate >= h.start && isoDate <= h.end)) return false;

                                if (emp.preferences.some(p => p.day === dayName && p.shiftIndex === shiftIndex && p.type === PreferenceType.UNAVAILABLE)) return false;
                                if (emp.restDay === dayName) return false;
                                return true;
                            };

                            for (let i = 0; i < needed; i++) {
                                const waitersInShift = assignedEmployees.map(a => employees.find(e => e.name === a.name)).filter(e => e?.roleId === waiterRoleId).length;
                                const seniorsInShift = assignedEmployees.map(a => employees.find(e => e.name === a.name)).filter(e => e && seniorRoleIds.includes(e.roleId || 0)).length;
                                const needsWaiter = waitersInShift < waitersNeeded;
                                const needsSenior = (waitersNeeded > 0 || assignedEmployees.some(a => employees.find(e=> e.name === a.name)?.requiresPairing)) && seniorsInShift === 0;
                                let availableCandidates = employees.filter(isAvailable);
                                let scoredCandidates = availableCandidates.map(emp => {
                                    let score = calculateStressScore(emp, date, shiftIndex, bar, empStats, req, seniorRoleIds, assignedEmployees);
                                    if (needsWaiter && emp.roleId !== waiterRoleId) { score += 10000; }
                                    if (needsSenior && !seniorRoleIds.includes(emp.roleId || 0)) { score += 5000; }
                                    return { employee: emp, score };
                                }).filter(c => c.score < Infinity).sort((a,b) => a.score - b.score);
                                let bestCandidate = scoredCandidates[0];
                                if (bestCandidate) {
                                    const winner = bestCandidate.employee;
                                    const {start, end} = getDefaultForShift(bar, shiftIndex);
                                    const assignment = { name: winner.name, start, end };
                                    assignedEmployees.push(assignment);
                                    assignedToday.add(winner.id);
                                    const shiftHours = getHoursDiff(start, end);
                                    empStats[winner.id].hours += shiftHours;
                                    const weekNum = getWeekOfYear(date);
                                    empStats[winner.id].weeklyShifts[weekNum] = (empStats[winner.id].weeklyShifts[weekNum] || 0) + 1;
                                } else {
                                    if (needsWaiter) { assignedEmployees.push({ name: 'CAMERIERE MANCANTE', start: '', end: '' }); } else { assignedEmployees.push({ name: 'SCOPERTO', start: '', end: '' }); }
                                }
                            }
                            newSchedule[isoDate][cellKey] = assignedEmployees;
                        }
                    });
                });
                setSchedule(newSchedule);
                runValidation(newSchedule);
            };

            const runValidation = useCallback((currentSchedule) => {
                const newAlerts = {};
                const empHours = {};
                const seniorRoleIds = roles.filter(r => r.name === 'Barman' || r.name === 'Manager').map(r => r.id);
                Object.entries(currentSchedule).forEach(([isoDate, daySchedule]) => {
                    Object.entries(daySchedule).forEach(([cellKey, assignments]) => {
                        const shiftEmployees = assignments.filter(a => a.name !== 'SCOPERTO' && a.name !== 'CAMERIERE MANCANTE' && a.name !== 'CHIUSO').map(a => employees.find(e => e.name === a.name)).filter(e => !!e);
                        const juniorsInShift = shiftEmployees.filter(e => e.requiresPairing);
                        if (juniorsInShift.length > 0) {
                            const seniorsInShift = shiftEmployees.filter(e => seniorRoleIds.includes(e.roleId || 0));
                            if (seniorsInShift.length === 0 && shiftEmployees.length > 1) { 
                                juniorsInShift.forEach(junior => {
                                    if (!newAlerts[junior.name]) newAlerts[junior.name] = [];
                                    newAlerts[junior.name].push(`Affiancamento mancante il ${isoDate.split('-').reverse().join('/')}`);
                                });
                            }
                        }
                        assignments.forEach(assignment => {
                             if(assignment.name !== 'SCOPERTO' && assignment.name !== 'CAMERIERE MANCANTE' && assignment.name !== 'CHIUSO') {
                                const hours = getHoursDiff(assignment.start, assignment.end);
                                empHours[assignment.name] = (empHours[assignment.name] || 0) + hours;
                             }
                        });
                    });
                });
                employees.forEach(e => {
                    if ((empHours[e.name] || 0) > e.maxHours) {
                        if(!newAlerts[e.name]) newAlerts[e.name] = [];
                        newAlerts[e.name].push(`Sforamento ore mensili (${(empHours[e.name]||0).toFixed(1)}/${e.maxHours})`);
                    }
                });
                setAlerts(newAlerts);
            }, [employees, roles]);

            const handleSaveShift = (newAssignments) => {
                if (editCellData) {
                    const { date, barId, shiftIndex } = editCellData;
                    const cellKey = `${barId}-${shiftIndex}`;
                    const newSchedule = JSON.parse(JSON.stringify(schedule));
                    if (!newSchedule[date]) newSchedule[date] = {};
                    newSchedule[date][cellKey] = newAssignments;
                    setSchedule(newSchedule);
                    runValidation(newSchedule);
                }
                setEditModalOpen(false);
                setEditCellData(null);
            };

            const handleArchive = () => {
                const label = prompt("Etichetta per questo salvataggio:");
                const period = viewMode === 'monthly' ? month : selectedWeek;
                if (label && period) {
                    const gridElement = document.getElementById('schedule-grid-container');
                    if (gridElement) {
                        onArchive(label, period, gridElement.innerHTML, schedule, bars);
                    } else { alert("Impossibile trovare la griglia da archiviare."); }
                }
            };

            const handleExportToExcel = () => {
                const period = viewMode === 'monthly' ? month : selectedWeek;
                if (Object.keys(schedule).length === 0) { alert("Nessuna griglia da esportare."); return; }
                exportToExcel(period, schedule, bars, getDatesForPeriod());
            }

            const barColors = [
                { bg: 'bg-blue-50', border: 'border-blue-500', text: 'text-blue-800' },
                { bg: 'bg-emerald-50', border: 'border-emerald-500', text: 'text-emerald-800' },
                { bg: 'bg-amber-50', border: 'border-amber-500', text: 'text-amber-800' },
                { bg: 'bg-purple-50', border: 'border-purple-500', text: 'text-purple-800' },
                { bg: 'bg-rose-50', border: 'border-rose-500', text: 'text-rose-800' },
            ];

            const renderedGrid = useMemo(() => {
                const datesToRender = getDatesForPeriod();
                if (datesToRender.length === 0) return <div className="text-center p-12 bg-white rounded-xl border border-dashed border-slate-300 text-slate-500"><i className="fa-solid fa-calendar mb-2 text-2xl"></i><p>Seleziona un periodo e genera la griglia.</p></div>;
                if (Object.keys(schedule).length === 0) return <div className="text-center p-12 bg-white rounded-xl border border-dashed border-slate-300 text-slate-500"><i className="fa-solid fa-magic mb-2 text-2xl"></i><p>Clicca su "Genera Griglia" per iniziare.</p></div>;

                const dayNames = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
                
                return (
                    <div id="schedule-grid-container" className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm bg-white">
                        <table className="min-w-full text-sm border-collapse">
                            <thead className="bg-slate-50 z-20 sticky top-0 shadow-sm">
                                <tr>
                                    <th className="p-3 border-b border-r border-slate-200 font-bold sticky left-0 bg-slate-50 z-30 text-slate-800 text-left min-w-[100px]">Data</th>
                                    {bars.map((bar, idx) => {
                                        const color = barColors[idx % barColors.length];
                                        return <th key={bar.id} colSpan={bar.shifts} className={`p-3 border-b border-r border-slate-200 font-bold text-center ${color.bg} ${color.text} border-l-4 ${color.border}`}>{bar.name.toUpperCase()}</th>;
                                    })}
                                </tr>
                                <tr>
                                    <th className="p-2 border-b border-r border-slate-200 sticky left-0 bg-slate-50 z-30"></th>
                                    {bars.flatMap((bar, idx) => {
                                        const color = barColors[idx % barColors.length];
                                        const shifts = bar.shifts === 2 ? ['Turno 1', 'Turno 2'] : ['Mattina', 'Pomeriggio', 'Sera'];
                                        return shifts.slice(0, bar.shifts).map((s, sIdx) => 
                                            <th key={`${bar.id}-${s}`} className={`p-2 border-b border-r border-slate-200 text-xs font-semibold text-slate-600 ${sIdx === 0 ? `border-l-4 ${color.border}` : ''}`}>{s}</th>
                                        )
                                    })}
                                </tr>
                            </thead>
                            <tbody>
                                {datesToRender.map((date, rIdx) => {
                                    const isoDate = date.toISOString().split('T')[0];
                                    const dayOfMonth = date.getDate();
                                    const dayName = dayNames[date.getDay()];
                                    const dayNameFull = DAYS_OF_WEEK[date.getDay() === 0 ? 6 : date.getDay() - 1];
                                    const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                                    
                                    return (
                                        <tr key={isoDate} className={`${rIdx % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'} hover:bg-slate-100 transition-colors`}>
                                            <td className={`p-3 border-b border-r border-slate-200 text-center font-semibold sticky left-0 bg-white z-10 ${isWeekend ? 'text-indigo-600' : 'text-slate-700'}`}>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-lg leading-none">{dayOfMonth}</span>
                                                    <span className="text-[10px] uppercase tracking-wider">{dayName}</span>
                                                </div>
                                            </td>
                                            {bars.flatMap((bar, idx) => {
                                                const color = barColors[idx % barColors.length];
                                                const isBarClosedOnDate = bar.closurePeriods?.some(p => isoDate >= p.start && isoDate <= p.end);
                                                if (bar.closedDay === dayNameFull || isBarClosedOnDate) {
                                                    return [<td key={bar.id} colSpan={bar.shifts} className={`p-2 border-b border-r border-slate-200 text-center bg-slate-100/80 text-slate-400 text-xs font-medium border-l-4 ${color.border}`}>CHIUSO</td>];
                                                }
                                                return Array.from({length: bar.shifts}).map((_, shiftIndex) => {
                                                    const cellKey = `${bar.id}-${shiftIndex}`;
                                                    const assignments = schedule[isoDate]?.[cellKey] || [];
                                                    
                                                    // Handle closed shift display
                                                    if (assignments.length === 1 && assignments[0].name === 'CHIUSO') {
                                                        return <td key={cellKey} className={`p-2 border-b border-r border-slate-200 text-center bg-slate-100/50 text-slate-400 text-[10px] font-medium border-l-4 ${shiftIndex === 0 ? color.border : 'border-slate-100'}`}>CHIUSO</td>
                                                    }

                                                    return (
                                                        <td key={cellKey} className={`p-1 border-b border-r border-slate-200 align-top min-w-[140px] cursor-pointer hover:bg-white transition-colors ${shiftIndex === 0 ? `border-l-4 ${color.border}` : ''}`} onClick={() => { setEditCellData({ date: isoDate, barId: bar.id, shiftIndex }); setEditModalOpen(true); }}>
                                                            {assignments.map((assignment, index) => {
                                                                if (assignment.name === 'SCOPERTO') {
                                                                    return <div key={`${assignment.name}-${index}`} className="text-[10px] p-1.5 rounded mb-1 bg-rose-500 text-white font-bold text-center shadow-sm">SCOPERTO</div>
                                                                }
                                                                if (assignment.name === 'CAMERIERE MANCANTE') {
                                                                    return <div key={`${assignment.name}-${index}`} className="text-[10px] p-1.5 rounded mb-1 bg-amber-500 text-white font-bold text-center shadow-sm">CAM. MANCANTE</div>
                                                                }
                                                                const empAlerts = alerts[assignment.name] || [];
                                                                const hasAlerts = empAlerts.length > 0;
                                                                return (
                                                                    <div key={`${assignment.name}-${index}`} className={`text-[11px] p-1.5 rounded mb-1 border shadow-sm transition-transform hover:scale-[1.02] ${hasAlerts ? 'bg-rose-50 border-rose-200 text-rose-800' : 'bg-white border-slate-200 text-slate-700'}`}>
                                                                        <div className="flex justify-between items-center mb-0.5">
                                                                            <span className="font-bold truncate">{assignment.name}</span>
                                                                            {hasAlerts && <i className="fa-solid fa-triangle-exclamation text-rose-500 ml-1" title={empAlerts.join('\\n')}></i>}
                                                                        </div>
                                                                        <div className="text-slate-500 text-center font-mono text-[9px] bg-slate-50 rounded px-1">{`${assignment.start}-${assignment.end}`}</div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </td>
                                                    )
                                                });
                                            })}
                                        </tr>
                                    )
                                })}
                            </tbody>
                        </table>
                    </div>
                );
            }, [viewMode, month, selectedWeek, schedule, bars, alerts, getDatesForPeriod]);
            
            const barForModal = editCellData ? bars.find(b => b.id === editCellData.barId) : null;
            const enabledEmpsForModal = editCellData ? employees.filter(e => e.enabledBarIds.includes(editCellData.barId)) : [];

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-100 p-1 rounded-lg flex">
                                <button onClick={() => setViewMode('monthly')} className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${viewMode === 'monthly' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}>Mensile</button>
                                <button onClick={() => setViewMode('weekly')} className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${viewMode === 'weekly' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}>Settimanale</button>
                            </div>
                             {viewMode === 'monthly' ? (
                                <input type="month" value={month} onChange={(e) => setMonth(e.target.value)} className="p-1.5 border border-slate-300 rounded-md text-sm bg-white" />
                            ) : (
                                <input type="week" value={selectedWeek} onChange={(e) => setSelectedWeek(e.target.value)} className="p-1.5 border border-slate-300 rounded-md text-sm bg-white" />
                            )}
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={generateSchedule} className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-lg shadow-indigo-200 text-sm font-medium flex items-center gap-2 transition-transform hover:-translate-y-0.5">
                                <i className="fa-solid fa-wand-magic-sparkles"></i> Genera
                            </button>
                             <button onClick={() => runValidation(schedule)} className="px-4 py-2 bg-amber-500 text-white rounded-lg hover:bg-amber-600 shadow-lg shadow-amber-200 text-sm font-medium flex items-center gap-2 transition-transform hover:-translate-y-0.5">
                                <i className="fa-solid fa-triangle-exclamation"></i> Verifica
                            </button>
                            <div className="h-6 w-px bg-slate-300 mx-1"></div>
                            <button 
                                onClick={handleArchive} 
                                disabled={Object.keys(schedule).length === 0}
                                className="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-800 shadow-lg shadow-slate-300 text-sm font-medium flex items-center gap-2 transition-transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <i className="fa-solid fa-box-archive"></i> Archivia
                            </button>
                            <button 
                                onClick={handleExportToExcel} 
                                disabled={Object.keys(schedule).length === 0}
                                className="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 shadow-lg shadow-emerald-200 text-sm font-medium flex items-center gap-2 transition-transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <i className="fa-solid fa-file-excel"></i> Export
                            </button>
                        </div>
                    </div>
                    {renderedGrid}
                    {editCellData && barForModal && (
                        <Modal
                            isOpen={isEditModalOpen}
                            onClose={() => setEditModalOpen(false)}
                            title={`Gestione Turno: ${barForModal.name} - ${editCellData.date}`}
                            size='lg'
                        >
                            <EditShiftForm 
                                employees={enabledEmpsForModal} 
                                currentAssignments={schedule[editCellData.date]?.[`${editCellData.barId}-${editCellData.shiftIndex}`] || []}
                                onSave={handleSaveShift}
                                date={editCellData.date}
                                getDefaultForShift={() => getDefaultForShift(barForModal, editCellData.shiftIndex)}
                            />
                        </Modal>
                    )}
                </div>
            );
        };

        // Reports Component
        const Reports = ({ employees, archives }) => {
            const [selectedArchive, setSelectedArchive] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'ascending' });
            
            const getHoursDiff = (start, end) => {
                if (!start || !end) return 0;
                const d1 = new Date(`2000-01-01T${start}`);
                const d2 = new Date(`2000-01-01T${end}`);
                if (d2 <= d1) d2.setDate(d2.getDate() + 1);
                const diff = (d2.getTime() - d1.getTime()) / 36e5;
                return isNaN(diff) ? 0 : diff;
            };
            
            const sortedReportData = useMemo(() => {
                if (!selectedArchive) return [];
                const { scheduleData } = selectedArchive;
                const empHours = {};
                employees.forEach(e => empHours[e.name] = 0);
                Object.values(scheduleData).forEach(daySchedule => {
                    Object.values(daySchedule).forEach(assignments => {
                        assignments.forEach(assignment => {
                            if (assignment.name !== 'SCOPERTO' && assignment.name !== 'CAMERIERE MANCANTE' && assignment.name !== 'CHIUSO') {
                                const hours = getHoursDiff(assignment.start, assignment.end);
                                empHours[assignment.name] = (empHours[assignment.name] || 0) + hours;
                            }
                        });
                    });
                });
                let sortableItems = employees.map(e => ({
                    ...e,
                    workedHours: empHours[e.name] || 0,
                    difference: (empHours[e.name] || 0) - e.maxHours
                }));
                sortableItems.sort((a, b) => {
                    if (a[sortConfig.key] < b[sortConfig.key]) { return sortConfig.direction === 'ascending' ? -1 : 1; }
                    if (a[sortConfig.key] > b[sortConfig.key]) { return sortConfig.direction === 'ascending' ? 1 : -1; }
                    return 0;
                });
                return sortableItems;
            }, [selectedArchive, employees, sortConfig]);

            const requestSort = (key) => {
                let direction = 'ascending';
                if (sortConfig.key === key && sortConfig.direction === 'ascending') { direction = 'descending'; }
                setSortConfig({ key, direction });
            };

            const getSortIcon = (key) => {
                if (sortConfig.key !== key) { return <i className="fa-solid fa-sort text-slate-300 ml-1"></i>; }
                if (sortConfig.direction === 'ascending') { return <i className="fa-solid fa-sort-up text-indigo-500 ml-1"></i>; }
                return <i className="fa-solid fa-sort-down text-indigo-500 ml-1"></i>;
            };
            
             const TableHeader = ({ a_key, label }) => (
                <th 
                    className="p-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-50 transition-colors"
                    onClick={() => requestSort(a_key)}
                >
                    {label} {getSortIcon(a_key)}
                </th>
            );

             if (!selectedArchive) {
                 return (
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 animate-fade-in">
                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                             <div className="w-10 h-10 rounded-lg bg-purple-100 flex items-center justify-center text-purple-600">
                                <i className="fa-solid fa-chart-pie"></i>
                            </div>
                            Reportistica
                        </h3>
                        {archives.length === 0 ? (
                            <div className="text-center p-12 bg-slate-50 rounded-lg border border-dashed border-slate-300">Nessun dato disponibile.</div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {archives.map(archive => (
                                    <div key={archive.id} className="p-4 border border-slate-200 rounded-xl hover:shadow-md hover:border-purple-200 transition-all cursor-pointer bg-white group" onClick={() => setSelectedArchive(archive)}>
                                        <div className="flex justify-between items-start mb-2">
                                            <h5 className="font-bold text-slate-800 group-hover:text-purple-700">{archive.label}</h5>
                                            <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500">{archive.date}</span>
                                        </div>
                                        <p className="text-sm text-slate-500 mb-4">Periodo: {archive.period}</p>
                                        <button className="w-full py-2 bg-purple-50 text-purple-600 rounded-lg text-sm font-medium group-hover:bg-purple-600 group-hover:text-white transition-colors">Apri Report</button>
                                    </div>
                                ))}                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-fade-in">
                     <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <div>
                             <h3 className="text-xl font-bold text-slate-800">{selectedArchive.label}</h3>
                             <p className="text-sm text-slate-500">Periodo: {selectedArchive.period}</p>
                        </div>
                        <button onClick={() => setSelectedArchive(null)} className="px-4 py-2 bg-white border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-50 text-sm font-medium transition-colors">Torna all'elenco</button>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-slate-100">
                            <thead className="bg-white">
                                <tr>
                                    <TableHeader a_key='name' label='Nominativo' />
                                    <TableHeader a_key='workedHours' label='Ore Lavorate' />
                                    <TableHeader a_key='maxHours' label='Target' />
                                    <TableHeader a_key='difference' label='Differenza' />
                                    <th className="p-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Performance</th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-slate-50">
                                {sortedReportData.map((emp, idx) => {
                                    const percentage = emp.maxHours > 0 ? (emp.workedHours / emp.maxHours) * 100 : 0;
                                    const barColor = percentage > 100 ? 'bg-rose-500' : percentage > 85 ? 'bg-emerald-500' : 'bg-blue-500';
                                    const diffColor = emp.difference > 0 ? 'text-rose-600 font-bold' : 'text-emerald-600 font-bold';
                                    return (
                                        <tr key={emp.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 whitespace-nowrap font-medium text-slate-800">{emp.name}</td>
                                            <td className="p-4 whitespace-nowrap text-slate-600">{emp.workedHours.toFixed(1)}h</td>
                                            <td className="p-4 whitespace-nowrap text-slate-400">{emp.maxHours}h</td>
                                            <td className={`p-4 whitespace-nowrap ${diffColor}`}>{emp.difference > 0 ? `+${emp.difference.toFixed(1)}` : emp.difference.toFixed(1)}h</td>
                                            <td className="p-4 whitespace-nowrap align-middle">
                                                <div className="w-48">
                                                    <div className="flex justify-between text-[10px] text-slate-400 mb-1">
                                                        <span>0%</span>
                                                        <span>{percentage.toFixed(0)}%</span>
                                                    </div>
                                                    <div className="relative w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                                        <div className={`${barColor} h-2 rounded-full transition-all duration-1000 ease-out`} style={{ width: `${Math.min(100, percentage)}%` }}></div>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // Archive Component
        const Archive = ({ archives, onDelete, onExport }) => {
            const [viewingArchive, setViewingArchive] = useState(null);
            return (
                <React.Fragment>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 animate-fade-in">
                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                            <div className="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center text-white">
                                <i className="fa-solid fa-archive"></i>
                            </div>
                            Archivio Storico
                        </h3>
                        {archives.length === 0 ? (
                            <div className="text-center p-12 bg-slate-50 rounded-lg border border-dashed border-slate-300 text-slate-500">L'archivio è vuoto.</div>
                        ) : (
                            <div className="space-y-4">
                                {archives.map(archive => (
                                    <div key={archive.id} className="flex flex-col md:flex-row justify-between items-center p-4 border border-slate-200 rounded-xl hover:shadow-md transition-all bg-white">
                                        <div className="mb-4 md:mb-0">
                                            <p className="font-bold text-slate-800 text-lg">{archive.label}</p>
                                            <div className="flex items-center gap-3 text-sm text-slate-500">
                                                <span><i className="fa-regular fa-calendar mr-1"></i>{archive.period}</span>
                                                <span className="w-1 h-1 bg-slate-300 rounded-full"></span>
                                                <span>Salvato il: {archive.date}</span>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setViewingArchive(archive)} className="px-4 py-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 font-medium text-sm transition-colors">
                                                <i className="fa-solid fa-eye mr-2"></i>Visualizza
                                            </button>
                                            <button onClick={() => onExport(archive)} className="px-4 py-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-100 font-medium text-sm transition-colors">
                                                <i className="fa-solid fa-file-excel mr-2"></i>Excel
                                            </button>
                                            <button onClick={() => onDelete(archive.id)} className="px-4 py-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100 font-medium text-sm transition-colors">
                                                <i className="fa-solid fa-trash mr-2"></i>Elimina
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    <Modal isOpen={!!viewingArchive} onClose={() => setViewingArchive(null)} title={`Anteprima: ${viewingArchive?.label}`} size="full">
                        {viewingArchive && <div className="p-4 overflow-auto" dangerouslySetInnerHTML={{ __html: viewingArchive.html }} />}
                    </Modal>
                </React.Fragment>
            );
        };

        // App Component
        const App = () => {
            const [companyName, setCompanyName] = useLocalStorage('app_company_name', 'Nome Azienda');
            const [activeTab, setActiveTab] = useState('bars');
            const [bars, setBars] = useLocalStorage('echoes_bars', []);
            const [employees, setEmployees] = useLocalStorage('echoes_employees', []);
            const [roles, setRoles] = useLocalStorage('echoes_roles', [{id: 1, name: 'Cameriere'}, {id: 2, name: 'Barman'}, {id: 3, name: 'Manager'}, {id: 4, name: 'Cuoco'}]);
            const [requirements, setRequirements] = useLocalStorage('echoes_reqs', []);
            const [archives, setArchives] = useLocalStorage('echoes_archives', []);
            const [schedule, setSchedule] = useLocalStorage('echoes_schedule', {});
            const [scheduleMonth, setScheduleMonth] = useLocalStorage('echoes_schedule_month', new Date().toISOString().slice(0, 7));


            const exportScheduleToExcel = (period, scheduleData, barsData, datesToExport) => {
                const dayNames = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
                const header1 = ['Data'];
                const header2 = [''];
                const merges = [];
                let currentCol = 1;

                // Build Headers with visual separation
                barsData.forEach(bar => {
                    header1.push(bar.name);
                    for (let i = 1; i < bar.shifts; i++) header1.push(''); 
                    
                    merges.push({ s: { r: 0, c: currentCol }, e: { r: 0, c: currentCol + bar.shifts - 1 } });
                    
                    const shifts = bar.shifts === 2 ? ['Turno 1', 'Turno 2'] : ['Mattina', 'Pomeriggio', 'Sera'];
                    header2.push(...shifts.slice(0, bar.shifts));
                    
                    header1.push(''); 
                    header2.push('');
                    currentCol += bar.shifts + 1;
                });

                const data = [header1, header2];

                // Data Rows
                datesToExport.forEach(date => {
                    const isoDate = date.toISOString().split('T')[0];
                    const dayOfMonth = date.getDate();
                    const dayName = dayNames[date.getDay()];
                    const row = [`${dayOfMonth} ${dayName}`];
                    let currentCell = 1;

                    barsData.forEach(bar => {
                        const dayNameFull = DAYS_OF_WEEK[date.getDay() === 0 ? 6 : date.getDay() - 1];
                        const isBarClosedOnDate = bar.closurePeriods?.some(p => isoDate >= p.start && isoDate <= p.end);
                        const isClosedDay = bar.closedDay === dayNameFull;

                        if (isClosedDay || isBarClosedOnDate) {
                            row.push('CHIUSO');
                            for (let i = 1; i < bar.shifts; i++) row.push('');
                            if (bar.shifts > 1) {
                                merges.push({ s: { r: data.length, c: currentCell }, e: { r: data.length, c: currentCell + bar.shifts - 1 } });
                            }
                        } else {
                            for (let shiftIndex = 0; shiftIndex < bar.shifts; shiftIndex++) {
                                const cellKey = `${bar.id}-${shiftIndex}`;
                                const assignments = scheduleData[isoDate]?.[cellKey] || [];
                                
                                // Handle partial closure for Excel
                                if (assignments.length === 1 && assignments[0].name === 'CHIUSO') {
                                    row.push('CHIUSO');
                                } else {
                                    const cellText = assignments.map(a => {
                                        if (a.name === 'SCOPERTO' || a.name === 'CAMERIERE MANCANTE') return a.name;
                                        return `${a.name} (${a.start}-${a.end})`;
                                    }).join('\n');
                                    row.push(cellText);
                                }
                            }
                        }
                        row.push('');
                        currentCell += bar.shifts + 1;
                    });
                    data.push(row);
                });

                const ws = XLSX.utils.aoa_to_sheet(data);
                ws['!merges'] = merges;
                const colWidths = [{ wch: 15 }]; 
                barsData.forEach(bar => {
                    for(let i=0; i<bar.shifts; i++) colWidths.push({ wch: 20 });
                    colWidths.push({ wch: 2 });
                });
                ws['!cols'] = colWidths;

                const summaryHeader = ['Dipendente', 'Ore Totali', 'Target Mensile', 'Differenza'];
                const summaryData = [summaryHeader];
                
                const empHours = {};
                employees.forEach(e => empHours[e.name] = 0);
                
                const getHDiff = (s, e) => {
                    if(!s||!e) return 0;
                    const d1=new Date(`2000-01-01T${s}`);
                    const d2=new Date(`2000-01-01T${e}`);
                    if(d2<=d1) d2.setDate(d2.getDate()+1);
                    return (d2.getTime()-d1.getTime())/36e5;
                };

                Object.values(scheduleData).forEach(daySchedule => {
                        Object.values(daySchedule).forEach(assignments => {
                            assignments.forEach(a => {
                                if(a.name !== 'SCOPERTO' && a.name !== 'CAMERIERE MANCANTE' && a.name !== 'CHIUSO') {
                                    empHours[a.name] = (empHours[a.name] || 0) + getHDiff(a.start, a.end);
                                }
                            })
                        })
                });

                employees.forEach(emp => {
                    const total = empHours[emp.name] || 0;
                    const diff = total - emp.maxHours;
                    summaryData.push([emp.name, total.toFixed(2), emp.maxHours, diff.toFixed(2)]);
                });

                const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
                wsSummary['!cols'] = [{wch: 25}, {wch: 15}, {wch: 15}, {wch: 15}];

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Turni Dettagliati');
                XLSX.utils.book_append_sheet(wb, wsSummary, 'Riepilogo Ore');
                XLSX.writeFile(wb, `Turni_${period.replace('-', '_')}.xlsx`);
            };

            const handleExportArchive = (archive) => {
                const { period, scheduleData, barsData } = archive;
                const isMonthly = !period.includes('-W');
                const dates = [];
                if (isMonthly) {
                    const [year, m] = period.split('-').map(Number);
                    const daysInMonth = new Date(year, m, 0).getDate();
                    for (let i = 1; i <= daysInMonth; i++) dates.push(new Date(year, m - 1, i));
                } else {
                    const [year, week] = period.split('-W').map(Number);
                    const d = new Date(Date.UTC(year, 0, 4));
                    d.setUTCDate(d.getUTCDate() + (week - 1) * 7);
                    const day = d.getUTCDay() || 7;
                    d.setUTCDate(d.getUTCDate() - day + 1);
                    for (let i = 0; i < 7; i++) {
                        const dayDate = new Date(d);
                        dayDate.setUTCDate(d.getUTCDate() + i);
                        dates.push(dayDate);
                    }
                }
                exportScheduleToExcel(period, scheduleData, barsData, dates);
            };
            
            const handleSaveBar = useCallback((barData) => { setBars(prev => { if (barData.id) { return prev.map(b => b.id === barData.id ? {...b, ...barData} : b); } return [...prev, { ...barData, id: Date.now() }]; }); }, [setBars]);
            const handleDeleteBar = useCallback((id) => { if (window.confirm("Sei sicuro di voler eliminare questo locale?")) { setBars(prev => prev.filter(b => b.id !== id)); } }, [setBars]);
            const handleSaveEmployee = useCallback((empData) => { setEmployees(prev => { if (empData.id) { return prev.map(e => e.id === empData.id ? {...e, ...empData} : e); } return [...prev, { ...empData, id: Date.now() }]; }); }, [setEmployees]);
            const handleDeleteEmployee = useCallback((id) => { if (window.confirm("Sei sicuro di voler eliminare questo dipendente?")) { setEmployees(prev => prev.filter(e => e.id !== id)); } }, [setEmployees]);
            const handleSaveRequirement = useCallback((reqData) => { setRequirements(prev => { const index = prev.findIndex(r => r.id === reqData.id); if (index > -1) { const newReqs = [...prev]; newReqs[index] = reqData; return newReqs; } return [...prev, reqData]; }); }, [setRequirements]);
            const handleDeleteRequirement = useCallback((id) => { if(window.confirm("Sei sicuro di voler eliminare questa configurazione?")) { setRequirements(prev => prev.filter(r => r.id !== id)); } }, [setRequirements]);
            const handleArchiveSchedule = useCallback((label, period, html, scheduleData, barsData) => { const newArchive = { id: Date.now(), label, period, html, scheduleData, barsData, date: new Date().toLocaleDateString('it-IT') }; setArchives(prev => [newArchive, ...prev]); alert(`Griglia "${label}" archiviata con successo!`); }, [setArchives]);
            const handleDeleteArchive = useCallback((id) => { if(window.confirm("Sei sicuro di voler eliminare questo archivio?")) { setArchives(prev => prev.filter(a => a.id !== id)); } }, [setArchives]);

            
            const tabs = [
                { id: 'bars', label: 'Locali', icon: 'fa-store' },
                { id: 'employees', label: 'Dipendenti', icon: 'fa-users' },
                { id: 'config', label: 'Configurazione', icon: 'fa-sliders' },
                { id: 'schedule', label: 'Turni & Griglia', icon: 'fa-calendar-alt' },
                { id: 'reports', label: 'Report', icon: 'fa-chart-pie' },
                { id: 'archive', label: 'Archivio', icon: 'fa-archive' },
                { id: 'settings', label: 'Impostazioni', icon: 'fa-cog' },
            ];
            
            return (
                <div className="flex h-screen bg-slate-50">
                    <aside className="hidden md:flex flex-col w-64 bg-slate-900 text-white h-full shadow-xl z-20">
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/50">
                                <i className="fa-solid fa-layer-group text-xl"></i>
                            </div>
                            <div>
                                <h1 className="font-bold text-lg leading-none truncate w-32">{companyName}</h1>
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest">Shift Manager Pro</span>
                            </div>
                        </div>
                        <nav className="flex-grow p-4 space-y-2 overflow-y-auto">
                            {tabs.map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 ${
                                        activeTab === tab.id 
                                        ? 'bg-indigo-600 text-white shadow-md shadow-indigo-900/20' 
                                        : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                                    }`}
                                >
                                    <i className={`fa-solid ${tab.icon} w-5`}></i>
                                    {tab.label}
                                </button>
                            ))}
                        </nav>
                    </aside>
                    
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        <header className="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center z-20 shadow-md">
                                <div className="flex items-center gap-2">
                                <i className="fa-solid fa-layer-group text-indigo-500"></i>
                                <span className="font-bold truncate">{companyName}</span>
                            </div>
                        </header>
                        <nav className="md:hidden flex overflow-x-auto bg-slate-800 text-slate-300 p-2 gap-2 shadow-inner shrink-0">
                                {tabs.map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex-shrink-0 px-3 py-2 rounded-md text-xs font-medium whitespace-nowrap ${
                                        activeTab === tab.id ? 'bg-indigo-600 text-white' : 'hover:bg-slate-700'
                                    }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </nav>

                        <main className="flex-1 overflow-auto p-4 md:p-8 relative">
                                <div className="max-w-7xl mx-auto">
                                <div className="mb-6 flex justify-between items-end">
                                    <h2 className="text-2xl font-bold text-slate-800">{tabs.find(t => t.id === activeTab)?.label}</h2>
                                    <span className="text-xs text-slate-400 hidden md:block">{new Date().toLocaleDateString('it-IT', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                </div>
                                {activeTab === 'bars' && <Bars bars={bars} onSave={handleSaveBar} onDelete={handleDeleteBar} />}
                                {activeTab === 'employees' && <Employees employees={employees} bars={bars} roles={roles} onSave={handleSaveEmployee} onDelete={handleDeleteEmployee} />}
                                {activeTab === 'config' && <Configuration requirements={requirements} bars={bars} onSaveRequirement={handleSaveRequirement} onDeleteRequirement={handleDeleteRequirement} />}
                                {activeTab === 'schedule' && <ScheduleGrid bars={bars} employees={employees} requirements={requirements} roles={roles} onArchive={handleArchiveSchedule} schedule={schedule} setSchedule={setSchedule} month={scheduleMonth} setMonth={setScheduleMonth} exportToExcel={exportScheduleToExcel} />}
                                {activeTab === 'reports' && <Reports employees={employees} archives={archives} />}
                                {activeTab === 'archive' && <Archive archives={archives} onDelete={handleDeleteArchive} onExport={handleExportArchive} />}
                                {activeTab === 'settings' && <Settings companyName={companyName} setCompanyName={setCompanyName} />}
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
