<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shift Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Excel Library -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      body { font-family: 'Inter', sans-serif; }
      
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- CONSTANTS ---
        const DAYS_OF_WEEK = ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato', 'Domenica'];

        const PreferenceType = {
            PREFEERED: 'preferred',
            UNAVAILABLE: 'unavailable',
            MANDATORY: 'mandatory',
        };

        // --- HOOKS ---
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };

            return [storedValue, setValue];
        }

        // --- COMPONENTS ---

        // Modal Component
        const Modal = ({ isOpen, onClose, title, children, footer, size = 'md' }) => {
            if (!isOpen) return null;

            const sizeClasses = {
                sm: 'max-w-sm',
                md: 'max-w-md',
                lg: 'max-w-lg',
                xl: 'max-w-xl',
                full: 'max-w-full m-4',
            };

            return (
                <div 
                    className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in"
                    onClick={onClose}
                >
                    <div 
                        className={`bg-white rounded-xl shadow-2xl w-full ${sizeClasses[size]} flex flex-col max-h-[90vh] overflow-hidden border border-slate-100`}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <header className="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-slate-50/50">
                            <h3 className="text-lg font-bold text-slate-800">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-200">
                                <i className="fa-solid fa-times text-lg"></i>
                            </button>
                        </header>
                        <main className="p-6 overflow-y-auto">
                            {children}
                        </main>
                        {footer && (
                            <footer className="flex justify-end gap-3 px-6 py-4 bg-slate-50 border-t border-slate-100">
                                {footer}
                            </footer>
                        )}
                    </div>
                </div>
            );
        };

        // Settings Component (NEW)
        const Settings = ({ companyName, setCompanyName }) => {
            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 animate-fade-in">
                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3 pb-4 border-b border-slate-100">
                        <div className="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center text-gray-600">
                            <i className="fa-solid fa-cog"></i>
                        </div>
                        Impostazioni Generali
                    </h3>
                    <div className="max-w-xl space-y-6">
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-2">Nome Azienda / Attività</label>
                            <input 
                                type="text" 
                                value={companyName} 
                                onChange={(e) => setCompanyName(e.target.value)} 
                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                placeholder="Inserisci il nome della tua attività"
                            />
                            <p className="text-xs text-slate-500 mt-2">Questo nome apparirà nella barra laterale e nei report esportati.</p>
                        </div>
                    </div>
                </div>
            );
        };

        // BarForm Component
        const BarForm = ({ bar, onSave, onCancel }) => {
            const [formData, setFormData] = useState({
                name: '',
                closedDay: '',
                shifts: 3,
                openTime: '09:00',
                closeTime: '02:00',
                closurePeriods: [],
                partialClosures: [], 
                shiftDefinitions: []
            });
            const [newClosure, setNewClosure] = useState({ start: '', end: '' });
            const [newPartial, setNewPartial] = useState({ day: DAYS_OF_WEEK[0], shifts: [] });

            const calculateDefaultShifts = (shifts, open, close) => {
                const d1 = new Date(`2000-01-01T${open}`);
                const d2 = new Date(`2000-01-01T${close}`);
                if (d2 <= d1) d2.setDate(d2.getDate() + 1);
                
                const totalDurationMs = d2.getTime() - d1.getTime();
                const shiftDurationMs = totalDurationMs / shifts;
                
                const definitions = [];
                
                for (let i = 0; i < shifts; i++) {
                    const s = new Date(d1.getTime() + (i * shiftDurationMs));
                    const e = new Date(d1.getTime() + ((i + 1) * shiftDurationMs));
                    
                    definitions.push({
                        start: s.toTimeString().slice(0, 5),
                        end: e.toTimeString().slice(0, 5)
                    });
                }
                return definitions;
            };

            useEffect(() => {
                if (bar) {
                    setFormData({
                        id: bar.id,
                        name: bar.name || '',
                        closedDay: bar.closedDay || '',
                        shifts: bar.shifts || 3,
                        openTime: bar.openTime || '09:00',
                        closeTime: bar.closeTime || '02:00',
                        closurePeriods: bar.closurePeriods || [],
                        partialClosures: bar.partialClosures || [],
                        shiftDefinitions: bar.shiftDefinitions || calculateDefaultShifts(bar.shifts, bar.openTime, bar.closeTime)
                    });
                } else {
                    setFormData(prev => ({
                        ...prev,
                        shiftDefinitions: calculateDefaultShifts(prev.shifts || 3, prev.openTime || '09:00', prev.closeTime || '02:00')
                    }));
                }
            }, [bar]);

            const handleRecalculateShifts = () => {
                const defs = calculateDefaultShifts(formData.shifts || 3, formData.openTime || '09:00', formData.closeTime || '02:00');
                setFormData(prev => ({ ...prev, shiftDefinitions: defs }));
            };

            const handleChange = (e) => {
                const { name, value } = e.target;
                
                if (name === 'shifts') {
                    const newShifts = parseInt(value);
                    const defs = calculateDefaultShifts(newShifts, formData.openTime || '09:00', formData.closeTime || '02:00');
                    setFormData(prev => ({ ...prev, shifts: newShifts, shiftDefinitions: defs }));
                } else {
                    setFormData(prev => ({ ...prev, [name]: value }));
                }
            };

            const handleShiftDefinitionChange = (index, field, value) => {
                const newDefs = [...(formData.shiftDefinitions || [])];
                if (newDefs[index]) {
                    newDefs[index][field] = value;
                    setFormData(prev => ({ ...prev, shiftDefinitions: newDefs }));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };

            const addClosurePeriod = () => {
                if (newClosure.start && newClosure.end && newClosure.start <= newClosure.end) {
                    setFormData(prev => ({...prev, closurePeriods: [...(prev.closurePeriods || []), newClosure]}));
                    setNewClosure({ start: '', end: '' });
                } else {
                    alert('La data di inizio deve essere precedente o uguale alla data di fine.');
                }
            };

            const removeClosurePeriod = (index) => {
                setFormData(prev => ({ ...prev, closurePeriods: (prev.closurePeriods || []).filter((_, i) => i !== index) }));
            };

            const toggleNewPartialShift = (shiftIndex) => {
                setNewPartial(prev => {
                    const shifts = prev.shifts.includes(shiftIndex) 
                        ? prev.shifts.filter(s => s !== shiftIndex) 
                        : [...prev.shifts, shiftIndex];
                    return { ...prev, shifts };
                });
            };

            const addPartialClosure = () => {
                if (newPartial.shifts.length === 0) return;
                setFormData(prev => {
                    const existing = prev.partialClosures || [];
                    const filtered = existing.filter(p => p.day !== newPartial.day);
                    return { 
                        ...prev, 
                        partialClosures: [...filtered, { day: newPartial.day, closedShiftIndexes: newPartial.shifts }] 
                    };
                });
                setNewPartial({ day: DAYS_OF_WEEK[0], shifts: [] });
            };

            const removePartialClosure = (day) => {
                setFormData(prev => ({ 
                    ...prev, 
                    partialClosures: (prev.partialClosures || []).filter(p => p.day !== day) 
                }));
            };

            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3 pb-4 border-b border-slate-100">
                        <div className="w-10 h-10 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600">
                            <i className="fa-solid fa-store"></i>
                        </div>
                        {bar ? 'Modifica Locale' : 'Nuovo Locale'}
                    </h3>
                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <div>
                                <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Nome Locale</label>
                                <input type="text" name="name" value={formData.name} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" required placeholder="Es. Lounge Bar" />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Giorno di Chiusura (Totale)</label>
                                <select name="closedDay" value={formData.closedDay} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                    <option value="">Nessuna</option>
                                    {DAYS_OF_WEEK.map(day => <option key={day} value={day}>{day}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Struttura Turni</label>
                                <select name="shifts" value={formData.shifts} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                    <option value="3">3 Turni (Mattina/Pomeriggio/Sera)</option>
                                    <option value="2">2 Turni (Unico/Spezzato)</option>
									<option value="1">1 Turno (Serale)</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Orario Apertura (Rif.)</label>
                                <input type="time" name="openTime" value={formData.openTime} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Orario Chiusura (Rif.)</label>
                                <input type="time" name="closeTime" value={formData.closeTime} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required />
                            </div>
                        </div>

                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                            <h4 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                                <i className="fa-solid fa-calendar-minus"></i> Chiusure Parziali Ricorrenti
                            </h4>
                            <div className="flex flex-wrap items-end gap-3 mb-4">
                                <div>
                                    <label className="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Giorno</label>
                                    <select value={newPartial.day} onChange={e => setNewPartial({...newPartial, day: e.target.value})} className="p-2 border border-slate-300 rounded text-sm focus:border-indigo-500 outline-none">
                                        {DAYS_OF_WEEK.map(day => <option key={day} value={day}>{day}</option>)}
                                    </select>
                                </div>
                                <div className="flex items-center gap-2">
                                    {Array.from({length: formData.shifts}).map((_, idx) => (
                                        <label key={idx} className={`cursor-pointer px-3 py-2 rounded text-xs font-medium border transition-colors ${newPartial.shifts.includes(idx) ? 'bg-rose-100 border-rose-300 text-rose-700' : 'bg-white border-slate-300 text-slate-600'}`}>
                                            <input type="checkbox" className="hidden" checked={newPartial.shifts.includes(idx)} onChange={() => toggleNewPartialShift(idx)} />
                                            Chiudi T{idx+1}
                                        </label>
                                    ))}
                                </div>
                                <button type="button" onClick={addPartialClosure} className="px-3 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm">
                                    <i className="fa-solid fa-plus"></i>
                                </button>
                            </div>
                            
                            {formData.partialClosures && formData.partialClosures.length > 0 && (
                                <div className="flex flex-wrap gap-2">
                                    {formData.partialClosures.map((pc, idx) => (
                                        <div key={idx} className="bg-white px-3 py-2 rounded border border-slate-200 shadow-sm flex items-center gap-2 text-sm">
                                            <span className="font-bold text-slate-700">{pc.day}:</span>
                                            <span className="text-rose-600 text-xs">Chiuso {pc.closedShiftIndexes.map(i => `T${i+1}`).join(', ')}</span>
                                            <button type="button" onClick={() => removePartialClosure(pc.day)} className="ml-2 text-slate-400 hover:text-rose-500">
                                                <i className="fa-solid fa-times"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                            <div className="flex justify-between items-center mb-4">
                                <h4 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                                    <i className="fa-solid fa-clock"></i> Configurazione Orari Turni
                                </h4>
                                <button type="button" onClick={handleRecalculateShifts} className="text-xs text-indigo-600 hover:text-indigo-800 font-medium bg-indigo-50 px-2 py-1 rounded">
                                    <i className="fa-solid fa-rotate mr-1"></i> Ricalcola Standard
                                </button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {formData.shiftDefinitions?.map((def, idx) => (
                                    <div key={idx} className="bg-white p-3 rounded shadow-sm border border-slate-200">
                                        <label className="text-[10px] uppercase font-bold text-slate-400 mb-2 block">
                                            Turno {idx + 1}
                                            {formData.shifts === 3 ? (idx === 0 ? ' (Mattina)' : idx === 1 ? ' (Pom.)' : ' (Sera)') : ''}
                                        </label>
                                        <div className="flex items-center gap-2">
                                            <div className="flex-1">
                                                <span className="text-[10px] text-slate-500 block">Inizio</span>
                                                <input 
                                                    type="time" 
                                                    value={def.start} 
                                                    onChange={(e) => handleShiftDefinitionChange(idx, 'start', e.target.value)}
                                                    className="w-full p-1.5 border border-slate-300 rounded text-sm font-mono focus:border-indigo-500 outline-none" 
                                                />
                                            </div>
                                            <i className="fa-solid fa-arrow-right text-slate-300 text-xs mt-3"></i>
                                            <div className="flex-1">
                                                <span className="text-[10px] text-slate-500 block">Fine</span>
                                                <input 
                                                    type="time" 
                                                    value={def.end} 
                                                    onChange={(e) => handleShiftDefinitionChange(idx, 'end', e.target.value)}
                                                    className="w-full p-1.5 border border-slate-300 rounded text-sm font-mono focus:border-indigo-500 outline-none" 
                                                />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                            <h4 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                                <i className="fa-solid fa-umbrella-beach"></i> Chiusure Straordinarie / Ferie Locale
                            </h4>
                            <div className="space-y-3 mb-3">
                                {formData.closurePeriods?.map((period, index) => (
                                    <div key={index} className="flex items-center gap-3 bg-white p-2 px-3 rounded border border-slate-200 shadow-sm">
                                        <div className="text-sm text-slate-600">
                                            Dal <span className="font-semibold text-slate-800">{period.start}</span> al <span className="font-semibold text-slate-800">{period.end}</span>
                                        </div>
                                        <button type="button" onClick={() => removeClosurePeriod(index)} className="ml-auto text-rose-500 hover:text-rose-700 hover:bg-rose-50 p-1 rounded transition-colors">
                                            <i className="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                ))}
                            </div>
                            <div className="flex items-end gap-3">
                                <div>
                                    <label className="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Inizio</label>
                                    <input type="date" value={newClosure.start} onChange={e => setNewClosure({...newClosure, start: e.target.value})} className="p-2 border border-slate-300 rounded text-sm focus:border-indigo-500 outline-none" />
                                </div>
                                <div>
                                    <label className="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Fine</label>
                                    <input type="date" value={newClosure.end} onChange={e => setNewClosure({...newClosure, end: e.target.value})} className="p-2 border border-slate-300 rounded text-sm focus:border-indigo-500 outline-none" />
                                </div>
                                <button type="button" onClick={addClosurePeriod} className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 shadow-sm shadow-indigo-200">
                                    <i className="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>

                        <div className="pt-4 flex gap-3 border-t border-slate-100">
                            <button type="submit" className="px-6 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all transform hover:-translate-y-0.5 flex items-center gap-2">
                                <i className="fa-solid fa-save"></i> Salva Locale
                            </button>
                            {bar && (
                                <button type="button" onClick={onCancel} className="px-6 py-2.5 bg-white border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 transition-colors">
                                    Annulla
                                </button>
                            )}
                        </div>
                    </form>
                </div>
            );
        };

        // Bars Component
        const Bars = ({ bars, onSave, onDelete }) => {
            const [editingBar, setEditingBar] = useState(null);

            const handleSave = (bar) => {
                onSave(bar);
                setEditingBar(null);
            }

            return (
                <div className="space-y-8 animate-fade-in">
                    <BarForm bar={editingBar} onSave={handleSave} onCancel={() => setEditingBar(null)} />
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {bars.map(bar => (
                            <div key={bar.id} className="group bg-white rounded-xl shadow-sm hover:shadow-xl border border-slate-200 hover:border-indigo-100 transition-all duration-300 overflow-hidden">
                                <div className="h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                                <div className="p-6">
                                    <div className="flex justify-between items-start mb-4">
                                        <h4 className="text-lg font-bold text-slate-800 group-hover:text-indigo-700 transition-colors">{bar.name}</h4>
                                        <span className="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">{bar.shifts} Turni</span>
                                    </div>
                                    <div className="space-y-2 text-sm text-slate-500">
                                        <p className="flex items-center gap-3">
                                            <span className="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-slate-400"><i className="fa-solid fa-clock"></i></span>
                                            <span>{bar.openTime} - {bar.closeTime}</span>
                                        </p>
                                        <p className="flex items-center gap-3">
                                            <span className="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-slate-400"><i className="fa-solid fa-calendar-times"></i></span>
                                            <span>Chiusura: <span className="font-medium text-slate-700">{bar.closedDay || 'Nessuna'}</span></span>
                                        </p>
                                        {/* Partial Closures Display */}
                                        {bar.partialClosures && bar.partialClosures.length > 0 && (
                                            <div className="mt-2 text-xs bg-rose-50 text-rose-700 p-2 rounded border border-rose-100">
                                                <p className="font-bold mb-1">Chiusure Parziali:</p>
                                                {bar.partialClosures.map((pc, i) => (
                                                    <div key={i} className="flex justify-between">
                                                        <span>{pc.day}:</span>
                                                        <span>{pc.closedShiftIndexes.map(idx => `T${idx+1}`).join(', ')} Off</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {bar.shiftDefinitions && bar.shiftDefinitions.length > 0 && (
                                            <div className="mt-2 pt-2 border-t border-slate-100">
                                                <p className="text-[10px] uppercase font-bold text-slate-400 mb-1">Turni</p>
                                                <div className="grid grid-cols-1 gap-1">
                                                    {bar.shiftDefinitions.map((def, i) => (
                                                        <div key={i} className="flex justify-between text-xs text-slate-600 bg-slate-50 px-2 py-0.5 rounded">
                                                            <span>T{i+1}:</span>
                                                            <span className="font-mono">{def.start}-{def.end}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="mt-6 flex gap-2 pt-4 border-t border-slate-100">
                                        <button onClick={() => setEditingBar(bar)} className="flex-1 py-2 bg-amber-50 text-amber-600 rounded-lg hover:bg-amber-100 font-medium text-sm transition-colors flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-pen"></i> Modifica
                                        </button>
                                        <button onClick={() => onDelete(bar.id)} className="flex-1 py-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100 font-medium text-sm transition-colors flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-trash"></i> Elimina
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // EmployeeForm Component
        const EmployeeForm = ({ employee, bars, roles, onSave, onCancel }) => {
            const initialFormData = {
                name: '',
                maxHours: 160,
                restDay: '',
                restDaysPerWeek: 1,
                enabledBarIds: [],
                preferredBarIds: [],
                roleId: null,
                holidays: [],
                preferences: [],
                requiresPairing: false,
            };

            const [formData, setFormData] = useState(initialFormData);
            const [newHoliday, setNewHoliday] = useState({ start: '', end: '' });

            useEffect(() => {
                if (employee) {
                    setFormData({
                        id: employee.id,
                        name: employee.name,
                        maxHours: employee.maxHours,
                        restDay: employee.restDay,
                        restDaysPerWeek: employee.restDaysPerWeek,
                        enabledBarIds: employee.enabledBarIds,
                        preferredBarIds: employee.preferredBarIds || [],
                        roleId: employee.roleId,
                        holidays: employee.holidays || [],
                        preferences: employee.preferences || [],
                        requiresPairing: employee.requiresPairing || false,
                    });
                } else {
                    setFormData(initialFormData);
                }
            }, [employee]);

            const handleChange = (e) => {
                const { name, value, type } = e.target;
                if (type === 'checkbox') {
                    const { checked } = e.target;
                    setFormData(prev => ({...prev, [name]: checked }));
                    return;
                }
                let parsedValue = value;
                if (name === 'maxHours' || name === 'restDaysPerWeek') {
                    parsedValue = parseInt(value) || 0;
                } else if (name === 'roleId') {
                    const roleId = value ? parseInt(value) : null;
                    const role = roles.find(r => r.id === roleId);
                    const requiresPairing = role && role.id === 1; 
                    setFormData(prev => ({
                        ...prev,
                        roleId: roleId,
                        requiresPairing: requiresPairing,
                    }));
                    return;
                }
                setFormData(prev => ({ ...prev, [name]: parsedValue }));
            };
            
            const handleBarCheck = (barId) => {
                setFormData(prev => {
                    const enabledBarIds = prev.enabledBarIds?.includes(barId)
                        ? prev.enabledBarIds.filter(id => id !== barId)
                        : [...(prev.enabledBarIds || []), barId];
                    return { ...prev, enabledBarIds };
                });
            };

            const toggleBarPreference = (barId, e) => {
                e.preventDefault();
                setFormData(prev => {
                    const current = prev.preferredBarIds || [];
                    const newPrefs = current.includes(barId) ? current.filter(id => id !== barId) : [...current, barId];
                    return { ...prev, preferredBarIds: newPrefs };
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };

            const addHolidayPeriod = () => {
                if (newHoliday.start && newHoliday.end && newHoliday.start <= newHoliday.end) {
                    setFormData(prev => ({...prev, holidays: [...(prev.holidays || []), newHoliday]}));
                    setNewHoliday({ start: '', end: '' });
                } else {
                    alert('La data di inizio deve essere precedente o uguale alla data di fine.');
                }
            };

            const removeHolidayPeriod = (index) => {
                setFormData(prev => ({ ...prev, holidays: (prev.holidays || []).filter((_, i) => i !== index) }));
            };

            const togglePreference = (day, shiftIndex) => {
                const currentPref = formData.preferences?.find(p => p.day === day && p.shiftIndex === shiftIndex);
                let newPreferences;
                if (!currentPref) {
                    newPreferences = [...(formData.preferences || []), { day, shiftIndex, type: PreferenceType.PREFEERED }];
                } else {
                    switch (currentPref.type) {
                        case PreferenceType.PREFEERED: newPreferences = formData.preferences?.map(p => p === currentPref ? { ...p, type: PreferenceType.UNAVAILABLE } : p); break;
                        case PreferenceType.UNAVAILABLE: newPreferences = formData.preferences?.map(p => p === currentPref ? { ...p, type: PreferenceType.MANDATORY } : p); break;
                        case PreferenceType.MANDATORY: newPreferences = formData.preferences?.filter(p => p !== currentPref); break;
                        default: newPreferences = formData.preferences;
                    }
                }
                setFormData(prev => ({...prev, preferences: newPreferences}));
            }

            const getPreferenceStyle = (day, shiftIndex) => {
                const pref = formData.preferences?.find(p => p.day === day && p.shiftIndex === shiftIndex);
                if (!pref) return { bg: 'bg-slate-50', text: 'text-slate-300', icon: 'fa-circle' };
                switch (pref.type) {
                    case PreferenceType.PREFEERED: return { bg: 'bg-emerald-100', text: 'text-emerald-600', icon: 'fa-thumbs-up' };
                    case PreferenceType.UNAVAILABLE: return { bg: 'bg-rose-100', text: 'text-rose-600', icon: 'fa-ban' };
                    case PreferenceType.MANDATORY: return { bg: 'bg-blue-100', text: 'text-blue-600', icon: 'fa-star' };
                    default: return { bg: 'bg-slate-50', text: 'text-slate-300', icon: 'fa-circle' };
                }
            }

            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3 pb-4 border-b border-slate-100">
                        <div className="w-10 h-10 rounded-lg bg-emerald-100 flex items-center justify-center text-emerald-600">
                            <i className="fa-solid fa-user-gear"></i>
                        </div>
                        {employee ? 'Scheda Dipendente' : 'Nuovo Dipendente'}
                    </h3>
                    <form onSubmit={handleSubmit} className="space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <div>
                                <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Nominativo</label>
                                <input type="text" name="name" value={formData.name} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required placeholder="Es. Mario Rossi" />
                            </div>
                            <div>
                                    <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Target Ore Mensili</label>
                                <input type="number" name="maxHours" value={formData.maxHours} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required />
                            </div>
                                <div>
                                    <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Ruolo</label>
                                <select name="roleId" value={formData.roleId || ''} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                                    <option value="">Nessun Ruolo</option>
                                    {roles.map(role => <option key={role.id} value={role.id}>{role.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Giorno Riposo Fisso</label>
                                <select name="restDay" value={formData.restDay} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                                    <option value="">Variabile</option>
                                    {DAYS_OF_WEEK.map(day => <option key={day} value={day}>{day}</option>)}
                                </select>
                            </div>
                            <div>
                                    <label className="block text-xs font-semibold uppercase text-slate-500 mb-2 tracking-wide">Riposi a Settimana</label>
                                <select name="restDaysPerWeek" value={formData.restDaysPerWeek} onChange={handleChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                                    <option value="1">1 Giorno</option>
                                    <option value="2">2 Giorni</option>
                                </select>
                            </div>
                            <div className="flex items-end">
                                <label className={`w-full flex items-center gap-3 cursor-pointer p-3 border rounded-lg transition-colors ${formData.requiresPairing ? 'bg-amber-50 border-amber-200' : 'bg-slate-50 border-slate-200'}`}>
                                    <input type="checkbox" name="requiresPairing" checked={!!formData.requiresPairing} onChange={handleChange} className="h-5 w-5 rounded text-amber-600 focus:ring-amber-500" />
                                    <div>
                                        <span className="block font-semibold text-slate-700">Junior / Apprendista</span>
                                        <span className="text-xs text-slate-500">Richiede affiancamento senior</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        {/* Holiday Section Added Here */}
                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                            <h4 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                                <i className="fa-solid fa-plane-departure"></i> Pianificazione Ferie / Assenze
                            </h4>
                            <div className="space-y-3 mb-3">
                                {formData.holidays?.map((holiday, index) => (
                                    <div key={index} className="flex items-center gap-3 bg-white p-2 px-3 rounded border border-slate-200 shadow-sm">
                                        <div className="text-sm text-slate-600">
                                            Dal <span className="font-semibold text-slate-800">{holiday.start}</span> al <span className="font-semibold text-slate-800">{holiday.end}</span>
                                        </div>
                                        <button type="button" onClick={() => removeHolidayPeriod(index)} className="ml-auto text-rose-500 hover:text-rose-700 hover:bg-rose-50 p-1 rounded transition-colors">
                                            <i className="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                ))}
                                {(!formData.holidays || formData.holidays.length === 0) && (
                                    <p className="text-xs text-slate-400 italic">Nessun periodo di ferie programmato.</p>
                                )}
                            </div>
                            <div className="flex items-end gap-3 pt-2 border-t border-slate-200">
                                <div>
                                    <label className="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Inizio</label>
                                    <input type="date" value={newHoliday.start} onChange={e => setNewHoliday({...newHoliday, start: e.target.value})} className="p-2 border border-slate-300 rounded text-sm focus:border-indigo-500 outline-none" />
                                </div>
                                <div>
                                    <label className="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Fine</label>
                                    <input type="date" value={newHoliday.end} onChange={e => setNewHoliday({...newHoliday, end: e.target.value})} className="p-2 border border-slate-300 rounded text-sm focus:border-indigo-500 outline-none" />
                                </div>
                                <button type="button" onClick={addHolidayPeriod} className="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700 shadow-sm shadow-emerald-200">
                                    <i className="fa-solid fa-plus"></i> Aggiungi
                                </button>
                            </div>
                        </div>

                        <div>
                            <label className="block text-xs font-semibold uppercase text-slate-500 mb-3 tracking-wide">Locali Abilitati e Preferenze</label>
                            <div className="flex flex-wrap gap-3">
                                {bars.map(bar => (
                                    <div key={bar.id} className={`flex items-center gap-2 px-3 py-2 rounded-lg border transition-all ${formData.enabledBarIds?.includes(bar.id) ? 'bg-indigo-50 border-indigo-200 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                                        <label className="flex items-center gap-2 cursor-pointer select-none">
                                            <input type="checkbox" checked={formData.enabledBarIds?.includes(bar.id)} onChange={() => handleBarCheck(bar.id)} className="hidden" />
                                            {formData.enabledBarIds?.includes(bar.id) ? <i className="fa-solid fa-check-circle"></i> : <i className="fa-regular fa-circle"></i>}
                                            <span className="font-medium">{bar.name}</span>
                                        </label>
                                        {formData.enabledBarIds?.includes(bar.id) && (
                                            <button 
                                                type="button"
                                                onClick={(e) => toggleBarPreference(bar.id, e)}
                                                className={`ml-2 w-6 h-6 flex items-center justify-center rounded-full transition-transform hover:scale-110 ${formData.preferredBarIds?.includes(bar.id) ? 'text-amber-400 hover:text-amber-500' : 'text-slate-300 hover:text-amber-300'}`}
                                                title={formData.preferredBarIds?.includes(bar.id) ? "Preferito" : "Segna come preferito"}
                                            >
                                                <i className="fa-solid fa-star"></i>
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div>
                                <label className="block text-xs font-semibold uppercase text-slate-500 mb-3 tracking-wide">Disponibilità Settimanale</label>
                            <div className="p-4 border border-slate-200 rounded-xl bg-slate-50/50">
                                <div className="flex justify-end gap-4 mb-3 text-xs font-medium text-slate-500">
                                    <div className="flex items-center gap-1"><i className="fa-solid fa-circle text-slate-300"></i> Standard</div>
                                    <div className="flex items-center gap-1"><i className="fa-solid fa-thumbs-up text-emerald-500"></i> Preferito</div>
                                    <div className="flex items-center gap-1"><i className="fa-solid fa-ban text-rose-500"></i> No</div>
                                    <div className="flex items-center gap-1"><i className="fa-solid fa-star text-blue-500"></i> Obbligo</div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-center text-sm border-separate border-spacing-1">
                                        <thead>
                                            <tr>
                                                <th></th>
                                                {DAYS_OF_WEEK.map(day => <th key={day} className="font-semibold text-slate-600 pb-2">{day.substring(0,3)}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {['Mattina', 'Pomeriggio', 'Sera'].map((shiftLabel, shiftIdx) => (
                                                <tr key={shiftIdx}>
                                                    <td className="text-left font-medium text-slate-700 pr-2">{shiftLabel}</td>
                                                    {DAYS_OF_WEEK.map(day => {
                                                        const style = getPreferenceStyle(day, shiftIdx);
                                                        return (
                                                            <td key={day}>
                                                                <button 
                                                                    type="button" 
                                                                    onClick={() => togglePreference(day, shiftIdx)} 
                                                                    className={`w-full h-9 rounded-md flex items-center justify-center text-sm ${style.bg} ${style.text} transition-all hover:brightness-95`}
                                                                >
                                                                    <i className={`fa-solid ${style.icon}`}></i>
                                                                </button>
                                                            </td>
                                                        )
                                                    })}
                                                </tr>
                                            ))}                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div className="pt-4 flex gap-3 border-t border-slate-100">
                            <button type="submit" className="px-6 py-2.5 bg-emerald-600 text-white font-medium rounded-lg hover:bg-emerald-700 shadow-lg shadow-emerald-200 transition-all transform hover:-translate-y-0.5 flex items-center gap-2">
                                <i className="fa-solid fa-save"></i> Salva Dipendente
                            </button>
                            {employee && (
                                <button type="button" onClick={onCancel} className="px-6 py-2.5 bg-white border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 transition-colors">
                                    Annulla
                                </button>
                            )}
                        </div>
                    </form>
                </div>
            );
        };

        // Employees Component
        const Employees = ({ employees, bars, roles, onSave, onDelete }) => {
            const [editingEmployee, setEditingEmployee] = useState(null);
            
            const handleSave = (employee) => {
                onSave(employee);
                setEditingEmployee(null);
            }

            return (
                <div className="space-y-8 animate-fade-in">
                    <EmployeeForm
                        employee={editingEmployee}
                        bars={bars}
                        roles={roles}
                        onSave={handleSave}
                        onCancel={() => setEditingEmployee(null)}
                    />
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {employees.map(employee => {
                            const role = roles.find(r => r.id === employee.roleId);
                            return (
                                <div key={employee.id} className="group bg-white rounded-xl shadow-sm hover:shadow-xl border border-slate-200 hover:border-emerald-100 transition-all duration-300 overflow-hidden flex flex-col">
                                    <div className="p-6 flex-grow">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h4 className="text-lg font-bold text-slate-800 flex items-center gap-2 group-hover:text-emerald-700 transition-colors">
                                                    {employee.name}
                                                    {employee.requiresPairing && <i className="fa-solid fa-user-graduate text-amber-500 text-sm" title="Richiede affiancamento"></i>}
                                                </h4>
                                                <span className="text-xs font-medium text-slate-500">{role?.name || 'Nessun ruolo'}</span>
                                            </div>
                                            <span className="bg-emerald-50 text-emerald-700 text-xs font-bold px-2.5 py-1 rounded-lg">{employee.maxHours}h</span>
                                        </div>
                                        <div className="space-y-2 mt-4">
                                            <p className="text-sm text-slate-600 flex items-center gap-2">
                                                <i className="fa-solid fa-bed text-slate-400 w-5"></i>
                                                Riposo: <span className="font-medium">{employee.restDay || 'Variabile'}</span>
                                            </p>
                                            {employee.holidays && employee.holidays.length > 0 && (
                                                 <div className="text-xs bg-rose-50 text-rose-600 p-2 rounded border border-rose-100 mt-2">
                                                    <strong className="block mb-1">Ferie:</strong>
                                                    {employee.holidays.slice(0, 2).map((h, i) => (
                                                        <div key={i}>{h.start} - {h.end}</div>
                                                    ))}
                                                    {employee.holidays.length > 2 && <span>+{employee.holidays.length - 2} altri</span>}
                                                </div>
                                            )}
                                            <div className="flex gap-1 flex-wrap mt-2">
                                                {employee.enabledBarIds.map(bid => {
                                                    const b = bars.find(bar => bar.id === bid);
                                                    return b ? (
                                                        <span key={bid} className={`text-[10px] px-2 py-0.5 rounded border flex items-center gap-1 ${employee.preferredBarIds?.includes(bid) ? 'bg-amber-50 border-amber-200 text-amber-700' : 'bg-slate-100 border-slate-200 text-slate-600'}`}>
                                                            {b.name}
                                                            {employee.preferredBarIds?.includes(bid) && <i className="fa-solid fa-star text-[8px]"></i>}
                                                        </span>
                                                    ) : null
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-auto flex gap-2 p-4 border-t border-slate-100 bg-slate-50/50">
                                        <button onClick={() => setEditingEmployee(employee)} className="flex-1 py-1.5 bg-white border border-slate-200 text-slate-600 rounded hover:bg-amber-50 hover:text-amber-600 hover:border-amber-200 text-sm transition-all">
                                            <i className="fa-solid fa-pen"></i>
                                        </button>
                                        <button onClick={() => onDelete(employee.id)} className="flex-1 py-1.5 bg-white border border-slate-200 text-slate-600 rounded hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 text-sm transition-all">
                                            <i className="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        // Configuration Component
        const Configuration = ({ requirements, bars, onSaveRequirement, onDeleteRequirement }) => {
            const [newReqBar, setNewReqBar] = useState(bars[0]?.id.toString() || '');
            const [newReqDay, setNewReqDay] = useState(DAYS_OF_WEEK[0]);
            
            const handleSaveRequirement = (req) => { onSaveRequirement(req); };
            const selectedBarForNewReq = bars.find(b => b.id === parseInt(newReqBar));

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3 pb-4 border-b border-slate-100">
                            <div className="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600">
                                <i className="fa-solid fa-sliders"></i>
                            </div>
                            Configurazione Fabbisogno
                        </h3>
                        
                        <div className="p-5 border border-blue-100 rounded-xl bg-blue-50/50 mb-8">
                            <h4 className="font-bold text-blue-900 mb-4 text-sm uppercase tracking-wide">Definisci Standard</h4>
                            <div className="flex flex-wrap items-end gap-4">
                                <div className="flex-1 min-w-[200px]">
                                    <label className="text-xs font-semibold text-blue-700 mb-1 block">Locale</label>
                                    <select value={newReqBar} onChange={e => setNewReqBar(e.target.value)} className="w-full p-2.5 bg-white border border-blue-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" disabled={bars.length === 0}>
                                        {bars.map(bar => <option key={bar.id} value={bar.id}>{bar.name}</option>)}
                                    </select>
                                </div>
                                <div className="flex-1 min-w-[200px]">
                                    <label className="text-xs font-semibold text-blue-700 mb-1 block">Giorno</label>
                                    <select value={newReqDay} onChange={e => setNewReqDay(e.target.value)} className="w-full p-2.5 bg-white border border-blue-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                        {DAYS_OF_WEEK.map(day => <option key={day} value={day}>{day}</option>)}
                                    </select>
                                </div>
                                <button 
                                    onClick={() => {
                                        if(newReqBar && newReqDay) {
                                            const defaultPersonnel = selectedBarForNewReq?.shifts === 2 ? [1,1,0] : [1,1,1];
                                            onSaveRequirement({id: `${newReqBar}-${newReqDay}`, barId: parseInt(newReqBar), day: newReqDay, personnel: defaultPersonnel, waiters: [0,0,0]});
                                        }
                                    }}
                                    className="px-6 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all disabled:opacity-50 disabled:shadow-none"
                                    disabled={!newReqBar || requirements.some(r => r.id === `${newReqBar}-${newReqDay}`)}
                                >
                                    {requirements.some(r => r.id === `${newReqBar}-${newReqDay}`) ? 'Già Configurato' : 'Aggiungi Regola'}
                                </button>
                            </div>
                        </div>

                        <div className="grid gap-4">
                            {requirements.sort((a,b) => a.barId - b.barId || DAYS_OF_WEEK.indexOf(a.day) - DAYS_OF_WEEK.indexOf(b.day)).map(req => {
                                const bar = bars.find(b => b.id === req.barId);
                                if (!bar) return null;
                                const shifts = bar.shifts === 2 ? ['Turno 1', 'Turno 2'] : ['Mattina', 'Pomeriggio', 'Sera'];
                                return (
                                    <div key={req.id} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                                        <div className="flex items-center gap-4 min-w-[200px]">
                                            <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold">{req.day.substring(0,2)}</div>
                                            <div>
                                                <h5 className="font-bold text-slate-800">{bar.name}</h5>
                                                <span className="text-sm text-slate-500">{req.day}</span>
                                            </div>
                                        </div>
                                        <div className="flex-grow grid grid-cols-1 sm:grid-cols-3 gap-4 w-full md:w-auto">
                                            {shifts.map((label, index) => {
                                                if (bar.shifts === 2 && index === 2) return null;
                                                return (
                                                    <div key={index} className="bg-slate-50 p-3 rounded-lg border border-slate-100">
                                                        <span className="text-[10px] uppercase font-bold text-slate-400 block mb-2">{label}</span>
                                                        <div className="flex gap-4">
                                                            <div>
                                                                <span className="text-xs text-slate-600 mr-2">Tot</span>
                                                                <input 
                                                                    type="number" min="0" value={req.personnel[index]} 
                                                                    onChange={e => {
                                                                        const newPersonnel = [...req.personnel];
                                                                        newPersonnel[index] = Math.max(0, parseInt(e.target.value) || 0);
                                                                        const newWaiters = [...(req.waiters || [0,0,0])];
                                                                        if (newWaiters[index] > newPersonnel[index]) {
                                                                            newWaiters[index] = newPersonnel[index];
                                                                        }
                                                                        handleSaveRequirement({...req, personnel: newPersonnel, waiters: newWaiters});
                                                                    }}
                                                                    className="w-12 text-center p-1 border rounded text-sm font-bold bg-white"
                                                                />
                                                            </div>
                                                            <div>
                                                                <span className="text-xs text-slate-600 mr-2">Cam</span>
                                                                <input 
                                                                    type="number" min="0" max={req.personnel[index]} value={req.waiters?.[index] || 0}
                                                                    onChange={e => {
                                                                        const newWaiters = [...(req.waiters || [0,0,0])];
                                                                        newWaiters[index] = Math.min(req.personnel[index], Math.max(0, parseInt(e.target.value) || 0));
                                                                        handleSaveRequirement({...req, waiters: newWaiters});
                                                                    }}
                                                                    className="w-12 text-center p-1 border rounded text-sm font-bold bg-white"
                                                                />
                                                            </div>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                        <button onClick={() => onDeleteRequirement(req.id)} className="text-slate-400 hover:text-rose-500 transition-colors p-2"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // EditShiftForm Component
        const EditShiftForm = ({ employees, currentAssignments, onSave, date, getDefaultForShift }) => {
            const [assignments, setAssignments] = useState([]);

            useEffect(() => {
                const defaultTimes = getDefaultForShift();
                const initialState = employees.map(emp => {
                    const existing = currentAssignments.find(a => a.name === emp.name);
                    return {
                        name: emp.name,
                        onHoliday: emp.holidays.some(h => date >= h.start && date <= h.end),
                        selected: !!existing,
                        start: existing ? existing.start : defaultTimes.start,
                        end: existing ? existing.end : defaultTimes.end
                    };
                });
                setAssignments(initialState);
            }, [employees, currentAssignments, date, getDefaultForShift]);

            const handleAssignmentChange = (index, field, value) => {
                const newAssignments = [...assignments];
                newAssignments[index][field] = value;
                setAssignments(newAssignments);
            };

            const handleSave = () => {
                const selected = assignments
                    .filter(a => a.selected)
                    .map(({ name, start, end }) => ({ name, start, end }));
                onSave(selected);
            };

            return (
                <div className="flex flex-col h-full">
                    <div className="bg-blue-50/50 p-4 rounded-lg mb-4 text-sm text-blue-800 border border-blue-100 flex items-start gap-3">
                        <i className="fa-solid fa-info-circle mt-0.5"></i>
                        <div>
                            <p className="font-semibold">Gestione Rapida</p>
                            <p className="text-blue-600">Seleziona i dipendenti per questo turno. Puoi modificare l'orario di ingresso e uscita direttamente qui.</p>
                        </div>
                    </div>
                    <div className="flex-grow overflow-y-auto pr-2 space-y-2">
                        {assignments.map((assign, index) => (
                            <div key={assign.name} className={`p-3 rounded-lg border transition-all ${assign.selected ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'bg-white border-slate-100 opacity-80 hover:opacity-100'} ${assign.onHoliday ? 'bg-slate-50 opacity-50 cursor-not-allowed' : ''}`}>
                                <div className="flex items-center gap-4">
                                    <label className="relative flex items-center p-2 rounded-full cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={assign.selected}
                                            disabled={assign.onHoliday}
                                            onChange={(e) => handleAssignmentChange(index, 'selected', e.target.checked)}
                                            className="peer relative appearance-none w-5 h-5 border rounded-md border-slate-300 cursor-pointer transition-all checked:bg-indigo-600 checked:border-indigo-600"
                                        />
                                        <i className="fa-solid fa-check text-white absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-xs opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
                                    </label>
                                    <div className="flex-grow">
                                        <span className={`font-medium block ${assign.selected ? 'text-indigo-900' : 'text-slate-700'}`}>{assign.name}</span>
                                        {assign.onHoliday && <span className="text-[10px] bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">In Ferie</span>}
                                    </div>
                                </div>
                                {assign.selected && (
                                    <div className="flex items-center gap-3 mt-3 pl-11 animate-fade-in">
                                        <div className="flex-1">
                                            <label className="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Ingresso</label>
                                            <input
                                                type="time"
                                                value={assign.start}
                                                onChange={(e) => handleAssignmentChange(index, 'start', e.target.value)}
                                                className="w-full p-1.5 bg-white border border-indigo-200 rounded text-sm text-center font-mono focus:ring-2 focus:ring-indigo-500 outline-none"
                                            />
                                        </div>
                                        <span className="text-slate-300 mt-4"><i className="fa-solid fa-arrow-right"></i></span>
                                        <div className="flex-1">
                                            <label className="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Uscita</label>
                                            <input
                                                type="time"
                                                value={assign.end}
                                                onChange={(e) => handleAssignmentChange(index, 'end', e.target.value)}
                                                className="w-full p-1.5 bg-white border border-indigo-200 rounded text-sm text-center font-mono focus:ring-2 focus:ring-indigo-500 outline-none"
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}                    </div>
                    <div className="mt-6 pt-4 border-t border-slate-100 flex justify-end">
                        <button onClick={handleSave} className="px-6 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">Conferma Assegnazioni</button>
                    </div>
                </div>
            );
        };

        // ScheduleGrid Component
        const ScheduleGrid = ({ bars, employees, requirements, roles, onArchive, schedule, setSchedule, month, setMonth, exportToExcel }) => {
            const [alerts, setAlerts] = useState({});
            const [isEditModalOpen, setEditModalOpen] = useState(false);
            const [editCellData, setEditCellData] = useState(null);
            const [viewMode, setViewMode] = useState('monthly');
            const [selectedWeek, setSelectedWeek] = useState(() => {
                const today = new Date();
                const year = today.getFullYear();
                const week = Math.ceil((((today.getTime() - new Date(year, 0, 1).getTime()) / 86400000) + new Date(year, 0, 1).getDay() + 1) / 7);
                return `${year}-W${week.toString().padStart(2, '0')}`;
            });

            const getHoursDiff = (start, end) => {
                if (!start || !end) return 0;
                const d1 = new Date(`2000-01-01T${start}`);
                const d2 = new Date(`2000-01-01T${end}`);
                if (d2 <= d1) d2.setDate(d2.getDate() + 1);
                const diff = (d2.getTime() - d1.getTime()) / 36e5;
                return isNaN(diff) ? 0 : diff;
            };

            const getDatesForPeriod = useCallback(() => {
                const dates = [];
                if (viewMode === 'monthly') {
                    if (!month) return [];
                    const [year, m] = month.split('-').map(Number);
                    if (isNaN(year) || isNaN(m)) return [];
                    const daysInMonth = new Date(year, m, 0).getDate();
                    for (let i = 1; i <= daysInMonth; i++) {
                        dates.push(new Date(year, m - 1, i));
                    }
                } else {
                    if (!selectedWeek) return [];
                    const [year, week] = selectedWeek.split('-W').map(Number);
                    if (isNaN(year) || isNaN(week)) return [];

                    const d = new Date(Date.UTC(year, 0, 4));
                    d.setUTCDate(d.getUTCDate() + (week - 1) * 7);
                    const day = d.getUTCDay() || 7;
                    d.setUTCDate(d.getUTCDate() - day + 1);
                    for (let i = 0; i < 7; i++) {
                        const dayDate = new Date(d);
                        dayDate.setUTCDate(d.getUTCDate() + i);
                        dates.push(dayDate);
                    }
                }
                return dates;
            }, [viewMode, month, selectedWeek]);

            const getWeekOfYear = (d) => {
                const date = new Date(d.getTime());
                date.setHours(0, 0, 0, 0);
                date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
                const week1 = new Date(date.getFullYear(), 0, 4);
                return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
            };

            const getDefaultForShift = useCallback((bar, shiftIndex) => {
                if (bar.shiftDefinitions && bar.shiftDefinitions[shiftIndex]) {
                    return {
                        start: bar.shiftDefinitions[shiftIndex].start,
                        end: bar.shiftDefinitions[shiftIndex].end
                    };
                }
                
                const shiftDurationMs = getHoursDiff(bar.openTime, bar.closeTime) / bar.shifts * 3600000;
                const barOpenTimeMs = new Date(`1970-01-01T${bar.openTime}`).getTime();
                const defaultStartMs = barOpenTimeMs + shiftIndex * shiftDurationMs;
                const defaultEndMs = defaultStartMs + shiftDurationMs;
                const formatTime = (date) => date.toTimeString().slice(0, 5);
                return { start: formatTime(new Date(defaultStartMs)), end: formatTime(new Date(defaultEndMs)) };
            }, []);

            const calculateStressScore = (employee, date, shiftIndex, bar, stats, req, seniorRoleIds, currentAssignmentsInCell) => {
                const dayName = DAYS_OF_WEEK[date.getDay() === 0 ? 6 : date.getDay() - 1];
                const weekNum = getWeekOfYear(date);
                
                const shiftDef = getDefaultForShift(bar, shiftIndex);
